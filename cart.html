<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - Digital Hub Store</title>
<link rel="stylesheet" href="style.css">
<style>
/* CART PAGE STYLES */
.cart-container {
  max-width: 900px;
  margin: 40px auto;
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}
.cart-container h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #ff4b4b;
}
.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid #eee;
  padding: 10px 0;
}
.cart-item span {
  font-size: 16px;
}
.remove-btn {
  background: #ff4b4b;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.2s;
}
.remove-btn:hover {
  background: #e03e3e;
}
#cartTotal {
  font-weight: bold;
  margin-top: 15px;
  text-align: right;
  font-size: 18px;
}
.checkout-btn {
  margin-top: 20px;
  width: 100%;
  padding: 12px;
  background: #ff4b4b;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.2s;
}
.checkout-btn:hover {
  background: #e03e3e;
}
</style>
</head>
<body>

<div class="cart-container">
  <h2>Shopping Cart - Digital Hub Store</h2>

  <div id="cartItems"></div>
  <div id="cartTotal">Total: GHC 0</div>

  <button class="checkout-btn" onclick="goToCheckout()">Proceed to Checkout</button>
</div>

<script>
// LOAD CART ITEMS
function loadCart() {
  const cart = JSON.parse(localStorage.getItem('cart')) || [];
  const container = document.getElementById('cartItems');
  container.innerHTML = "";
  let total = 0;

  cart.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'cart-item';

    const itemText = document.createElement('span');
    itemText.textContent = `${item.item} - GHC ${item.price}`;

    const removeBtn = document.createElement('button');
    removeBtn.textContent = 'Remove';
    removeBtn.className = 'remove-btn';
    removeBtn.addEventListener('click', () => {
      removeFromCart(index);
      loadCart();
    });

    div.appendChild(itemText);
    div.appendChild(removeBtn);
    container.appendChild(div);

    total += item.price;
  });

  document.getElementById('cartTotal').textContent = `Total: GHC ${total}`;
}

// REMOVE ITEM FROM CART
function removeFromCart(index) {
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  cart.splice(index, 1);
  localStorage.setItem('cart', JSON.stringify(cart));
}

// GO TO CHECKOUT
function goToCheckout() {
  window.location.href = 'checkout.html';
}

// INITIALIZE
document.addEventListener("DOMContentLoaded", loadCart);
</script>

</body>
</html>
