<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Details - Digital Hub Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<div class="logo">Digital Hub Store</div>
</header>

<section class="details-section">
<h1>Enter Your Details</h1>
<p>Please fill in your information so we can deliver your purchase.</p>

<form id="customerForm">
  <label for="name">Full Name</label>
  <input type="text" id="name" placeholder="Your Name" required>

  <label for="email">Email Address</label>
  <input type="email" id="email" placeholder="you@example.com" required>

  <label for="phone">Phone Number</label>
  <input type="tel" id="phone" placeholder="e.g. 0241234567" required>

  <label for="receipt">Receipt Number</label>
  <input type="text" id="receipt" placeholder="Enter Receipt Number" required>

  <button type="submit" class="btn buy-now">Submit</button>
</form>
</section>

<script>
document.getElementById("customerForm").addEventListener("submit", function(e){
  e.preventDefault();
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const phone = document.getElementById("phone").value;
  const receipt = document.getElementById("receipt").value;

  const customer = {name,email,phone,receipt};
  localStorage.setItem("customerDetails", JSON.stringify(customer));

  alert("Details saved successfully!\nWe will process your order soon.");
  window.location.href = "index.html";
});
</script>

</body>
</html>
