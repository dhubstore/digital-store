<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Digital Hub Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* Checkout-specific styles */
body{background:#0f172a; color:white; margin:0; font-family:Poppins,sans-serif;}
.container{max-width:400px; margin:50px auto; background:#1e293b; padding:25px; border-radius:12px;}
.container h2{text-align:center; margin-bottom:20px; color:#38bdf8;}
input, select{width:100%; padding:12px; margin:8px 0; border:none; border-radius:6px;}
button{background:#f4b400; color:#0f172a; padding:12px; width:100%; font-size:16px; border:none; border-radius:6px; cursor:pointer;}
</style>
<script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>

<div class="container">
  <h2>Checkout</h2>
  <form id="checkoutForm">
    <label>Full Name</label>
    <input type="text" id="fullName" placeholder="John Doe" required>

    <label>Email</label>
    <input type="email" id="email" placeholder="you@mail.com" required>

    <label>Phone Number</label>
    <input type="tel" id="phone" placeholder="+233..." required>

    <label>Product</label>
    <select id="productSelect" required>
      <!-- Options will be populated dynamically -->
    </select>

    <label>Amount (GH₵)</label>
    <input type="text" id="amount" readonly>

    <button type="submit">Review and Pay</button>
  </form>
</div>

<script src="checkout.js" defer></script>
</body>
</html>
