<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Hub Store - Checkout</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.checkout-form{max-width:500px;margin:auto;background:#fff;padding:30px;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.2);}
.checkout-form h2{text-align:center;margin-bottom:20px;}
.checkout-form label{display:block;margin:10px 0 5px;font-weight:bold;}
.checkout-form input, .checkout-form select{width:100%;padding:12px;border-radius:6px;border:1px solid #ccc;margin-bottom:15px;font-size:16px;}
.checkout-form button{width:100%;background:#ff4b4b;color:white;border:none;padding:15px;font-size:18px;border-radius:8px;cursor:pointer;transition:0.3s;}
.checkout-form button:hover{background:#e03a3a;}
.back-btn{background:#ddd;color:#333;margin-top:10px;}
.cart-items{background:#eee;padding:10px;border-radius:6px;margin-bottom:15px;}
.whatsapp-float{
position:fixed;bottom:20px;right:20px;background:#25D366;color:white;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;text-decoration:none;box-shadow:0 4px 10px rgba(0,0,0,0.3);z-index:1000;
}
</style>
</head>
<body>

<div class="checkout-form">
<h2>Digital Hub Store Checkout</h2>
<div id="cartItems" class="cart-items"></div>

<form id="checkoutForm">
  <label><input type="checkbox" id="gift"> Is this a gift?</label>
  
  <label>First Name</label>
  <input type="text" id="fname" required>
  
  <label>Last Name</label>
  <input type="text" id="lname" required>
  
  <label>Email Address</label>
  <input type="email" id="email" required>
  
  <label>Phone Number</label>
  <input type="tel" id="phone" placeholder="+233XXXXXXXXX" required>
  
  <button type="submit">Review and Pay</button>
  <button type="button" class="back-btn" onclick="history.back()">Back</button>
</form>
</div>

<a href="https://wa.me/233509329683" class="whatsapp-float" target="_blank">💬</a>

<script>
const cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartDiv = document.getElementById('cartItems');
let total = 0;
cart.forEach((c) => {
  const div = document.createElement('div');
  div.textContent = `${c.item} - GHC ${c.price}`;
  cartDiv.appendChild(div);
  total += c.price;
});
if(cart.length > 0){
  const totalDiv = document.createElement('div');
  totalDiv.style.fontWeight = 'bold';
  totalDiv.style.marginTop = '10px';
  totalDiv.textContent = `Total: GHC ${total}`;
  cartDiv.appendChild(totalDiv);
}

document.getElementById('checkoutForm').addEventListener('submit', function(e){
  e.preventDefault();
  const fname = document.getElementById('fname').value;
  const lname = document.getElementById('lname').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;

  let orderText = `Hello, my name is ${fname} ${lname}. I want to buy:\n`;
  cart.forEach(c => {
    orderText += `- ${c.item} - GHC ${c.price}\n`;
  });
  orderText += `Total: GHC ${total}\nEmail: ${email}\nPhone: ${phone}`;

  const waLink = `https://wa.me/233509329683?text=${encodeURIComponent(orderText)}`;
  window.open(waLink, '_blank');
  alert("Order sent to WhatsApp!");
});
</script>

</body>
</html>
