<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Digital Hub Store</title>
<link rel="stylesheet" href="style.css">
<script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>

<header>
  <div class="logo">Digital Hub Store</div>
</header>

<section class="checkout-container">
  <h2>Checkout</h2>

  <div id="checkoutItems"></div>
  <div style="font-weight:bold;margin-top:15px;">Total: GHC <span id="checkoutTotal">0</span></div>

  <h3>Enter Your Details</h3>
  <label for="custName">Full Name</label>
  <input type="text" id="custName" placeholder="Your full name" required>

  <label for="custPhone">WhatsApp Number</label>
  <input type="text" id="custPhone" placeholder="e.g. 0533209931" required>

  <label for="custEmail">Email</label>
  <input type="email" id="custEmail" placeholder="you@example.com" required>

  <button id="payBtn">Pay Now</button>
</section>

<footer>
<p><strong>WhatsApp:</strong> <a href="https://wa.me/0509329683" target="_blank">0509329683</a></p>
<p><strong>Email:</strong> <a href="mailto:digitalhubghsupport@gmail.com">digitalhubghsupport@gmail.com</a></p>
</footer>

<script src="checkout.js"></script>
</body>
</html>
